[colors]
bg = #1d2021
fg = #ebdbb2
accent = #83a598
urgent = #fb4934

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 32
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=10;2"
; Falls du Nerd Font hast:
; font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left = i3
modules-center = datetime
modules-right = power

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
wrapping-scroll = false

label-focused = %name%
label-focused-padding = 1
label-focused-foreground = ${colors.bg}
label-focused-background = ${colors.accent}

label-unfocused = %name%
label-unfocused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-urgent = %name%
label-urgent-padding = 1
label-urgent-foreground = ${colors.bg}
label-urgent-background = ${colors.urgent}

[module/datetime]
type = internal/date
interval = 1
date = %a %d.%m.%Y
time = %H:%M
label = %date% · %time%

[module/power]
type = custom/text
format = POWER
format-padding = 1
click-left = ~/.config/polybar/scripts/powermenu.sh
